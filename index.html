<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interville de 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            background-color: #1a1a2e; /* Fond bleu nuit */
            color: #e0e0e0; /* Texte gris clair par défaut */
        }

        /* Conteneur principal masqué au début */
        .main-content {
            display: none;
        }

        h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: 4rem;
            margin: 20px 0;
            color: #ffffff; /* Blanc pour le titre */
            letter-spacing: 2px;
        }

        p {
            font-size: 1.5rem;
            margin: 20px 0;
            color: #e0e0e0; /* Gris clair pour le texte */
        }

        .gif-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }

        .gif-container img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        /* Style du bouton initial */
        .start-button {
            background-color: #4a4a8a; /* Bleu foncé pour le bouton */
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 5px;
            cursor: pointer;
            margin: 50px auto;
            display: block;
            transition: background-color 0.3s;
        }

        .start-button:hover {
            background-color: #3a3a6a; /* Bleu plus foncé au survol */
        }
    </style>
</head>
<body>
    <!-- Bouton initial (seul élément visible au début) -->
    <button class="start-button" id="startButton">🎵 Démarrer l'expérience</button>

    <!-- Contenu principal (masqué au début) -->
    <div class="main-content" id="mainContent">
        <h1>🎉 Interville de 2026 🎉</h1>
        <p>Merci à toi pour ton inscription, tié un tigre 🐯 !</p>

        <div class="gif-container">
            <img src="./gif13.gif" alt="GIF de confirmation">
        </div>

        <!-- Espace réservé pour le lien de la cagnotte -->
        <div id="cagnotte-link"></div>
    </div>

    <!-- Musique de fond -->
    <audio id="background-music" preload="auto" loop playsinline>
        <source src="./miaw.mp3" type="audio/mpeg">
        Ton navigateur ne supporte pas l'audio.
    </audio>

    <script>
        const startButton = document.getElementById('startButton');
        const mainContent = document.getElementById('mainContent');
        const audio = document.getElementById('background-music');

        // Fonction pour démarrer l'expérience
        startButton.addEventListener('click', function() {
            audio.play()
                .then(() => {
                    startButton.style.display = 'none';
                    mainContent.style.display = 'block';
                })
                .catch(error => {
                    console.error("Erreur de lecture :", error);
                    alert("Impossible de lancer la musique. Vérifiez le fichier ou essayez un autre navigateur.");
                });
        });
    </script>
</body>
</html>
