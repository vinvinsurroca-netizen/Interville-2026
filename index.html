```
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        padding: 20px;
        background-color: #1a1a2e;
        color: #e0e0e0;
    }

    .main-content {
        display: none;
        animation: fadeIn 1s ease;
    }

    h1 {
        font-family: 'Bebas Neue', cursive;
        font-size: 4rem;
        margin: 20px 0;
        color: #ffffff;
        letter-spacing: 2px;
        animation: pulseTitle 2s infinite;
    }

    p {
        font-size: 1.5rem;
        margin: 20px 0;
        color: #e0e0e0;
    }

    .gif-container {
        display: flex;
        justify-content: center;
        margin: 30px 0;
    }

    .gif-container img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
    }

    .start-button {
        background-color: #4a4a8a;
        color: white;
        border: none;
        padding: 20px 35px;
        font-size: 1.3rem;
        border-radius: 8px;
        cursor: pointer;
        margin: 50px auto;
        display: block;
        transition: background-color 0.3s, transform 0.2s;
    }

    .start-button:hover {
        background-color: #3a3a6a;
        transform: scale(1.03);
    }

    .button-subtitle {
        display: block;
        font-size: 0.75rem;
        margin-top: 8px;
        opacity: 0.85;
        font-weight: normal;
    }

    .cagnotte-container {
        margin-top: 50px;
    }

    .cagnotte-text {
        font-size: 1.3rem;
        font-weight: bold;
        color: #ffd166;
        margin-bottom: 15px;
        animation: pulse 2s infinite;
    }

    .cagnotte-button {
        display: inline-block;
        background: linear-gradient(45deg, #ffb703, #ffd166);
        color: #1a1a2e;
        text-decoration: none;
        padding: 18px 35px;
        border-radius: 12px;
        font-size: 1.3rem;
        font-weight: bold;
        box-shadow: 0 0 20px rgba(255, 183, 3, 0.6);
        transition: all 0.3s ease;
    }

    .cagnotte-button:hover {
        transform: scale(1.08);
        box-shadow: 0 0 30px rgba(255, 183, 3, 0.9);
    }

    .cagnotte-arrows {
        font-size: 2rem;
        margin-top: 10px;
        animation: bounce 1s infinite;
    }

    @keyframes pulse {
        0%, 100% {
            opacity: 1;
        }
        50% {
            opacity: 0.7;
        }
    }

    @keyframes bounce {
        0%, 100% {
            transform: translateY(0);
        }
        50% {
            transform: translateY(-8px);
        }
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(15px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes pulseTitle {
        0%,100% {
            transform: scale(1);
        }
        50% {
            transform: scale(1.05);
        }
    }
</style>
```

</head>
<body>

        <a

</div>

<audio id="background-music" preload="auto" loop playsinline>
    <source src="./miaw.mp3" type="audio/mpeg">
    Ton navigateur ne supporte pas l'audio.
</audio>

<script>
    const startButton = document.getElementById('startButton');
    const mainContent = document.getElementById('mainContent');
    const audio = document.getElementById('background-music');

    startButton.addEventListener('click', function () {

        audio.play().catch(error => {
            console.log("Lecture audio refusée :", error);
        });

        startButton.style.display = 'none';
        mainContent.style.display = 'block';
    });
</script>
